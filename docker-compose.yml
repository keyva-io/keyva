services:
  keyva:
    image: ghcr.io/keyva-io/keyva:latest
    ports:
      - "6399:6399"
    environment:
      - KEYVA_MASTER_KEY=${KEYVA_MASTER_KEY:?Set KEYVA_MASTER_KEY (64 hex chars)}
      - RUST_LOG=info
    volumes:
      - keyva-data:/data
      - ./config.example.toml:/config.toml:ro
    command: ["--config", "/config.toml"]
    restart: unless-stopped

volumes:
  keyva-data:
